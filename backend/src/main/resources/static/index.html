<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reference App</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/link.css">
  <link rel="stylesheet" href="/css/input.css">
  <link rel="stylesheet" href="/css/icon.css">
  <link rel="stylesheet" href="/css/icon-btn.css">
  <link rel="stylesheet" href="/css/lang-toggle.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/page.css">
  <link rel="stylesheet" href="/css/auth.css">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div id="app-header"></div>
  <script>
    window.headerConfig = {
      brand: { href: '/', label: 'Reference' },
      nav: [
        { href: '/', label: 'Home', active: true, testid: 'header-nav-home' },
        { href: '/login', label: 'Login', testid: 'header-nav-login' },
        { href: '/register', label: 'Register', testid: 'header-nav-register' },
      ],
      lang: { default: 'en' },
      theme: { default: 'dark' },
    };
  </script>
  <script type="module" src="/js/header.js"></script>

  <main class="page-shell page-shell--below-header grid reference-app" data-testid="reference-layout">
    <div class="panel panel--content">
      <div class="panel__bar">
        <div class="panel__dots" aria-hidden="true">
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
        </div>
        <div class="panel__trail">
          <span class="panel__title">Reference App</span>
        </div>
      </div>
      <div class="panel__body">
        <p class="text text--muted">
          Generic Spring Boot + static JS demo — items loaded from <code>/api/items</code>.
        </p>
      </div>
    </div>

    <div class="panel panel--content" data-testid="welcome-panel" hidden>
      <div class="panel__bar">
        <div class="panel__dots" aria-hidden="true">
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
        </div>
        <div class="panel__trail">
          <span class="panel__title">Session</span>
        </div>
      </div>
      <div class="panel__body reference-app__welcome-body">
        <p id="welcome-message" class="text" data-testid="welcome-message">Welcome!</p>
        <button id="logout-button" type="button" class="btn btn--primary" data-testid="logout-button">Logout</button>
      </div>
    </div>

    <div class="panel panel--content" data-testid="health-panel">
      <div class="panel__bar">
        <div class="panel__dots" aria-hidden="true">
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
        </div>
        <div class="panel__trail">
          <span class="panel__title">Health</span>
        </div>
      </div>
      <div class="panel__body">
        <p class="text text--sm text--muted" data-testid="health-status">→ Checking health…</p>
      </div>
    </div>

    <div class="reference-app__items grid" data-testid="items-list" aria-live="polite">
      <div class="panel panel--content">
        <div class="panel__bar">
          <div class="panel__dots" aria-hidden="true">
            <span class="panel__dot"></span>
            <span class="panel__dot"></span>
            <span class="panel__dot"></span>
          </div>
          <div class="panel__trail">
            <span class="panel__title">Items</span>
          </div>
        </div>
        <div class="panel__body">
          <p class="text text--muted">→ Loading items…</p>
        </div>
      </div>
    </div>
  </main>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
