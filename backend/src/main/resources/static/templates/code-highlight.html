<!-- JSON highlight: CodeHighlight.highlightJson(json) → innerHTML on pre.ch-code -->
<!-- Canonical palette — VS Code Dark+ (default on .ch-code); alt — .ch-theme--github | --muted | --contrast -->
<pre class="ch-code" data-testid="code-highlight" aria-label="JSON"></pre>

<!-- With panel terminal chrome — panel__code inherits mono sizing; theme on panel root -->
<div class="panel panel--terminal ch-theme--vscode" data-testid="code-highlight-panel">
  <div class="panel__bar">
    <div class="panel__dots" aria-hidden="true">
      <span class="panel__dot"></span>
      <span class="panel__dot"></span>
      <span class="panel__dot"></span>
    </div>
    <div class="panel__trail">
      <span class="panel__title">output.json</span>
    </div>
  </div>
  <pre class="panel__code ch-code" aria-label="JSON"></pre>
</div>
