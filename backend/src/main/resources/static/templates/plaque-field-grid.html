  <div class="plaque-field-grid__cell">
    <div class="plaque-field plaque-field--divided">

<!-- Build panel — ratio-221 stack (канон configurator-option-presets#build): 2 rows × 2/2/1, divider sync via stack -->
<div class="plaque-field-grid-stack plaque-field-grid-stack--ratio-221" data-testid="plaque-field-grid-build-stack">
  <div class="plaque-field-grid plaque-field-grid--mixed plaque-field-grid--ratio-221" role="group" aria-label="OS, language and java version">
    <div class="plaque-field-grid__cell">
      <label class="plaque-field plaque-field--divided plaque-field--stretch" data-param-id="buildOs">
        <span class="plaque-field__label">OS</span>
        <span class="plaque-divider" aria-hidden="true"></span>
        <select class="plaque-field__control">
          <option value="linux" selected>linux</option>
        </select>
      </label>
    </div>
    <div class="plaque-field-grid__cell">
      <label class="plaque-field plaque-field--divided plaque-field--stretch" data-param-id="buildLanguage">
        <span class="plaque-field__label">Language</span>
        <span class="plaque-divider" aria-hidden="true"></span>
        <select class="plaque-field__control">
          <option value="java" selected>java</option>
        </select>
      </label>
    </div>
    <div class="plaque-field-grid__cell">
      <label class="plaque-field plaque-field--stretch" data-param-id="javaVersion" aria-label="javaVersion">
        <select class="plaque-field__control" aria-label="javaVersion">
          <option value="21" selected>21</option>
        </select>
      </label>
    </div>
  </div>
  <div class="plaque-field-grid plaque-field-grid--mixed plaque-field-grid--ratio-221" role="group" aria-label="Build tool chain">
    <div class="plaque-field-grid__cell">
      <div class="plaque-field plaque-field--divided" data-param-id="buildTool">
        <span class="plaque-field__label" title="buildTool">buildTool</span>
        <span class="plaque-divider" aria-hidden="true"></span>
        <div class="plaque-field-seg-track plaque-field-seg-track--2 plaque-field__control">
          <div class="plaque-field-seg" role="radiogroup" aria-label="buildTool">
            <button type="button" class="plaque-field-seg__btn plaque-field-seg__btn--on" data-value="gradle" aria-pressed="true">gradle</button>
            <button type="button" class="plaque-field-seg__btn" data-value="maven" aria-pressed="false" title="Apache Maven">maven</button>
          </div>
        </div>
      </div>
    </div>
    <div class="plaque-field-grid__cell">
      <div class="plaque-field plaque-field--divided" data-param-id="gradleBin">
        <span class="plaque-field__label" title="gradleBin">gradleBin</span>
        <span class="plaque-divider" aria-hidden="true"></span>
        <div class="plaque-field-seg-track plaque-field-seg-track--2 plaque-field__control">
          <div class="plaque-field-seg" role="radiogroup" aria-label="gradleBin">
            <button type="button" class="plaque-field-seg__btn" data-value="gradle" aria-pressed="false" title="system gradle в PATH">gradle</button>
            <button type="button" class="plaque-field-seg__btn plaque-field-seg__btn--on" data-value="gradlew" aria-pressed="true" title="./gradlew (wrapper)">gradlew</button>
          </div>
        </div>
      </div>
    </div>
    <div class="plaque-field-grid__cell">
      <label class="plaque-field plaque-field--stretch" data-param-id="gradleVersion" aria-label="gradleVersion">
        <select class="plaque-field__control" aria-label="gradleVersion">
          <option value="9.6.0" selected>9.6.0</option>
        </select>
      </label>
    </div>
  </div>
</div>
