<!-- Configurator shell: page frame + 2×1 topology (content panel + sticky terminal) -->
<!--
  Left: panel.panel--content — config form (plaque-field, sections, stack)
  Right: panel.panel--terminal.panel--sticky + configurator__output-* chain
  Layout: grid grid--2x1 (2fr:3fr ≥769px via configurator__layout--terminal); modifier — sticky chain + panel__code
  Variants: toolbar (configurator__toolbar + panel--content), output-only (empty main), prompt (panel--sticky)
  Options layout inside panel__body: preview/configurator-options.html (flat stack, groups, grid, tabs, dense, scroll)
  Option presets (reusable field bundles, ≠ layout): preview/configurator-option-presets.html (driver, remote-hub)
  Alt aside: panel.panel--content.panel--sticky — textarea/preview (prompt-builder)
  Refs: preview/configurator.html, preview/configurator-options.html, preview/configurator-option-presets.html, preview/autotests-builder.html, preview/prompt-builder.html
-->
<main class="configurator">
  <a class="configurator__back" href="index.html">← template-project</a>

  <header class="configurator__intro">
    <h1 class="configurator__title"><!-- title --></h1>
    <p class="configurator__lead"><!-- lead --></p>
  </header>

  <!-- optional: <div class="configurator__toolbar">…</div> -->

  <div class="configurator__layout grid grid--2x1 configurator__layout--terminal">
    <div class="configurator__main">
      <!-- panel: templates/panel.html — panel--content -->
    </div>
    <div class="configurator__aside">
      <div class="configurator__output-panel">
        <div class="configurator__output-sticky">
          <!-- panel: templates/panel.html — panel--terminal + panel--sticky -->
        </div>
      </div>
    </div>
  </div>
</main>
