<!-- mode: panel--terminal (dark __code) | panel--content (warm __body) -->
<div class="panel panel--terminal" data-testid="panel">
  <div class="panel__bar">
    <div class="panel__dots" aria-hidden="true">
      <span class="panel__dot"></span>
      <span class="panel__dot"></span>
      <span class="panel__dot"></span>
    </div>
    <div class="panel__trail">
      <span class="panel__title">Title</span>
      <!-- optional: tabs inside trail -->
    </div>
    <!-- canonical: panel__bar-end | panel__actions as sibling of panel__trail (margin-left: auto in panel.css) -->
    <!-- <div class="panel__bar-end"><span class="badge">…</span><div class="panel__actions">…</div></div> -->
    <!-- or solo: <div class="panel__actions">…</div> -->
  </div>
  <!-- content mode: -->
  <!-- <div class="panel__body">…</div> -->
  <!-- terminal mode: -->
  <pre class="panel__code" aria-label="Output"></pre>
  <!-- optional: <div class="panel__foot">status / actions</div> -->
</div>
