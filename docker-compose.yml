services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: {{DB_NAME}}
      POSTGRES_USER: {{DB_USER}}
      POSTGRES_PASSWORD: {{DB_PASSWORD}}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - reference_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reference -d reference_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: {{DB_NAME}}
      DB_USER: {{DB_USER}}
      DB_PASSWORD: {{DB_PASSWORD}}
      SERVER_PORT: ${SERVER_PORT:-8080}
      JWT_SECRET: ${JWT_SECRET:-reference-app-dev-secret-change-in-production-min-32-chars}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    networks:
      - reference_internal

networks:
  reference_internal:
    driver: bridge

volumes:
  pgdata:
