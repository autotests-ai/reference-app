services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reference_app
      POSTGRES_USER: reference
      POSTGRES_PASSWORD: reference
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - reference_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reference -d reference_app"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: reference_app
      DB_USER: reference
      DB_PASSWORD: reference
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - reference_internal

networks:
  reference_internal:
    driver: bridge

volumes:
  pgdata:
