<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Reference App</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/link.css">
  <link rel="stylesheet" href="/css/input.css">
  <link rel="stylesheet" href="/css/button.css">
  <link rel="stylesheet" href="/css/panel.css">
  <link rel="stylesheet" href="/css/plaque-field.css">
  <link rel="stylesheet" href="/css/icon.css">
  <link rel="stylesheet" href="/css/icon-btn.css">
  <link rel="stylesheet" href="/css/lang-toggle.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div id="app-header"></div>
  <script>
    window.headerConfig = {
      brand: { href: '/', label: 'Reference' },
      nav: [
        { href: '/', label: 'Home', testid: 'header-nav-home' },
        { href: '/login', label: 'Login', testid: 'header-nav-login' },
        { href: '/register', label: 'Register', active: true, testid: 'header-nav-register' },
      ],
      lang: { default: 'en' },
      theme: { default: 'dark' },
    };
  </script>
  <script type="module" src="/js/header.js"></script>

  <main class="auth-page">
    <div class="panel panel--content auth-panel" data-testid="register-panel">
      <div class="panel__bar">
        <div class="panel__dots" aria-hidden="true">
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
          <span class="panel__dot"></span>
        </div>
        <div class="panel__trail">
          <span class="panel__title" data-testid="register-form-title">Register</span>
        </div>
      </div>
      <div class="panel__body">
        <form id="register-form" class="auth-form" data-testid="register-form">
          <div class="plaque-field-list">
            <label class="plaque-field plaque-field--divided plaque-field--stretch">
              <span class="plaque-field__text">Login</span>
              <input
                id="login-input"
                type="text"
                class="plaque-field__control input"
                autocomplete="username"
                data-testid="login-input"
              />
            </label>

            <label class="plaque-field plaque-field--divided plaque-field--stretch">
              <span class="plaque-field__text">Password</span>
              <input
                id="password-input"
                type="password"
                class="plaque-field__control input"
                autocomplete="new-password"
                data-testid="password-input"
              />
            </label>

            <label class="plaque-field plaque-field--divided plaque-field--stretch">
              <span class="plaque-field__text">Confirm</span>
              <input
                id="confirm-password-input"
                type="password"
                class="plaque-field__control input"
                autocomplete="new-password"
                data-testid="confirm-password-input"
              />
            </label>
          </div>

          <p id="error-message" class="auth-error" aria-live="polite" data-testid="error-message"></p>

          <div class="auth-form__actions">
            <button id="submit-button" type="submit" class="btn btn--primary btn--block" data-testid="submit-button">Register</button>
          </div>
        </form>

        <p class="auth-footer-link">
          Already have an account? <a href="/login" data-testid="login-link">Login</a>
        </p>
      </div>
    </div>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    const MESSAGES = {
      errorBothRequired: "Login and password are required (minimum {minLogin} and {minPassword} characters)",
      errorLoginRequired: "Login is required (minimum {minLogin} characters)",
      errorLoginMinLength: "Login must be at least {minLogin} characters",
      errorPasswordRequired: "Password is required (minimum {minPassword} characters)",
      errorPasswordMinLength: "Password must be at least {minPassword} characters",
      errorPasswordMismatch: "Passwords do not match",
      errorNetwork: "Network error. Check your connection and try again.",
      errorRegistrationFailed: "Registration failed",
    };

    const registerForm = document.getElementById("register-form");
    const loginInput = document.getElementById("login-input");
    const passwordInput = document.getElementById("password-input");
    const confirmPasswordInput = document.getElementById("confirm-password-input");
    const errorMessage = document.getElementById("error-message");
    const submitButton = document.getElementById("submit-button");

    registerForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorMessage.textContent = "";

      const username = loginInput.value.trim();
      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      const validationError = ReferenceAuth.validateCredentials(username, password, MESSAGES);
      if (validationError) {
        errorMessage.textContent = validationError;
        return;
      }
      if (password !== confirmPassword) {
        errorMessage.textContent = MESSAGES.errorPasswordMismatch;
        return;
      }

      submitButton.disabled = true;
      try {
        const response = await ReferenceAuth.register(username, password);
        ReferenceAuth.saveSession(response.token);
        window.location.href = response.redirectUrl || "/";
      } catch (error) {
        errorMessage.textContent = ReferenceAuth.resolveAuthErrorMessage(
          error,
          MESSAGES,
          MESSAGES.errorRegistrationFailed
        );
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
