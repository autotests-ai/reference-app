<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logged In — Reference App</title>
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/link.css">
  <link rel="stylesheet" href="/css/input.css">
  <link rel="stylesheet" href="/css/icon.css">
  <link rel="stylesheet" href="/css/icon-btn.css">
  <link rel="stylesheet" href="/css/lang-toggle.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
  <div id="app-header"></div>
  <script>
    window.headerConfig = {
      brand: { href: '/', label: 'Reference' },
      nav: [
        { href: '/', label: 'Home', testid: 'header-nav-home' },
        { href: '/login.html', label: 'Login', testid: 'header-nav-login' },
        { href: '/register.html', label: 'Register', testid: 'header-nav-register' },
      ],
      lang: { default: 'en' },
      theme: { default: 'dark' },
    };
  </script>
  <script type="module" src="/js/header.js"></script>

  <main class="auth-page">
    <section class="auth-card auth-success-panel" data-testid="success-panel">
      <h1 data-testid="logged-in-title">Logged In</h1>
      <p id="welcome-message" data-testid="welcome-message">Welcome!</p>
      <div class="actions">
        <button id="logout-button" type="button" data-testid="logout-button">Logout</button>
      </div>
    </section>
  </main>

  <script src="/js/auth.js"></script>
  <script>
    const welcomeMessage = document.getElementById("welcome-message");
    const logoutButton = document.getElementById("logout-button");

    async function loadProfile() {
      if (!ReferenceAuth.getToken()) {
        window.location.replace("/login.html");
        return;
      }

      try {
        const profile = await ReferenceAuth.fetchProfile();
        welcomeMessage.textContent = "Welcome, " + profile.username + "!";
      } catch (error) {
        ReferenceAuth.clearSession();
        window.location.replace("/login.html");
      }
    }

    logoutButton.addEventListener("click", async () => {
      await ReferenceAuth.logout();
      window.location.href = "/login.html";
    });

    loadProfile();
  </script>
</body>
</html>
