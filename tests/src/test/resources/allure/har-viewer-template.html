<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HAR Viewer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #1e1e1e;
      --panel: #252526;
      --border: #3c3c3c;
      --text: #cccccc;
      --muted: #858585;
      --accent: #3794ff;
      --get: #89d185;
      --post: #dcdcaa;
      --ok: #89d185;
      --warn: #cca700;
      --err: #f48771;
      --bar-wait: #7b68ee;
      --bar-receive: #3794ff;
      --hint-bg: #2a2d2e;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .header h1 { margin: 0; font-size: 14px; font-weight: 600; }
    .summary { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .toolbar { display: flex; align-items: center; gap: 12px; font-size: 11px; }
    .toolbar a, .toolbar button {
      color: var(--accent);
      background: none;
      border: 0;
      padding: 0;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
    }
    .toolbar a:hover, .toolbar button:hover { text-decoration: underline; }
    .toolbar .note { color: var(--muted); }
    .iframe-hint {
      display: none;
      margin: 0;
      padding: 10px 14px;
      background: var(--hint-bg);
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
    }
    .iframe-hint strong { color: var(--text); font-weight: 600; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.method { width: 56px; }
    col.status { width: 88px; }
    col.size { width: 72px; }
    col.time { width: 64px; }
    col.waterfall { width: 38%; }
    th, td {
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel);
      color: var(--muted);
      font-weight: 600;
      text-align: left;
    }
    td.url { color: var(--text); }
    td.method.GET { color: var(--get); }
    td.method.POST, td.method.PUT, td.method.PATCH { color: var(--post); }
    td.status.ok { color: var(--ok); }
    td.status.warn { color: var(--warn); }
    td.status.err { color: var(--err); }
    .waterfall {
      position: relative;
      height: 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
    }
    .bar {
      position: absolute;
      top: 3px;
      height: 10px;
      border-radius: 2px;
      min-width: 2px;
    }
    .bar.wait { background: var(--bar-wait); }
    .bar.receive { background: var(--bar-receive); top: 5px; height: 6px; }
    .empty, .error { padding: 24px; text-align: center; }
    .empty { color: var(--muted); }
    .error { color: var(--err); }
    /* Allure iframe is often tiny; nudge users to the full document */
    @media (max-height: 280px), (max-width: 480px) {
      .iframe-hint { display: block; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>HAR Viewer</h1>
    <div class="summary">__SUMMARY__</div>
    <div class="toolbar">
      <button type="button" id="open-viewer" hidden>Open viewer</button>
      <span class="note">Raw HAR: Allure attachment <code>capture.har</code></span>
    </div>
  </div>
  <p class="iframe-hint"><strong>Cramped preview.</strong> Open this HTML attachment in a new tab for the full waterfall.</p>
  __CONTENT__
  <!--
    Late, optional: runs only when the document is a top-level page (Allure "open in new tab").
    Allure iframe CSP typically blocks scripts — static table above remains the fallback.
  -->
  <script>
  (function () {
    try {
      if (window.top !== window.self) {
        var hint = document.querySelector(".iframe-hint");
        if (hint) hint.style.display = "block";
        var btn = document.getElementById("open-viewer");
        if (btn) {
          btn.hidden = false;
          btn.addEventListener("click", function () {
            window.open(window.location.href, "_blank", "noopener");
          });
        }
      }
    } catch (e) {
      var hint2 = document.querySelector(".iframe-hint");
      if (hint2) hint2.style.display = "block";
    }
  })();
  </script>
</body>
</html>
