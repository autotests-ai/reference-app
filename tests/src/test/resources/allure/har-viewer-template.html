<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HAR Viewer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #1e1e1e;
      --panel: #252526;
      --border: #3c3c3c;
      --text: #cccccc;
      --muted: #858585;
      --accent: #3794ff;
      --get: #89d185;
      --post: #dcdcaa;
      --ok: #89d185;
      --warn: #cca700;
      --err: #f48771;
      --bar-wait: #7b68ee;
      --bar-receive: #3794ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .header h1 { margin: 0; font-size: 14px; font-weight: 600; }
    .summary { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .toolbar a { color: var(--accent); text-decoration: none; font-size: 11px; }
    .toolbar a:hover { text-decoration: underline; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    col.method { width: 56px; }
    col.status { width: 88px; }
    col.size { width: 72px; }
    col.time { width: 64px; }
    col.waterfall { width: 38%; }
    th, td {
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--panel);
      color: var(--muted);
      font-weight: 600;
      text-align: left;
    }
    td.url { color: var(--text); }
    td.method.GET { color: var(--get); }
    td.method.POST, td.method.PUT, td.method.PATCH { color: var(--post); }
    td.status.ok { color: var(--ok); }
    td.status.warn { color: var(--warn); }
    td.status.err { color: var(--err); }
    .waterfall {
      position: relative;
      height: 16px;
      background: rgba(255,255,255,0.04);
      border-radius: 2px;
    }
    .bar {
      position: absolute;
      top: 3px;
      height: 10px;
      border-radius: 2px;
      min-width: 2px;
    }
    .bar.wait { background: var(--bar-wait); }
    .bar.receive { background: var(--bar-receive); top: 5px; height: 6px; }
    .empty, .error { padding: 24px; text-align: center; }
    .empty { color: var(--muted); }
    .error { color: var(--err); }
  </style>
</head>
<body>
  <div class="header">
    <h1>HAR Viewer</h1>
    <div class="summary">__SUMMARY__</div>
    <div class="toolbar">
      <a href="__DOWNLOAD_HREF__" download="capture.har">Download .har</a>
    </div>
  </div>
  __CONTENT__
</body>
</html>
