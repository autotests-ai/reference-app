# reference_ci — manual (@Tag(manual) — exploratory stubs)
# ./gradlew testManual -DpyramidStand=reference_ci

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=true
attachPageSource=true
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=true

# Target app
baseUrl=http://localhost:8080/
componentCatalogUrl=http://localhost:3000/

# REST API
apiBaseUrl=http://localhost:8080/

# Browser configuration
browser=chrome
browserVersion=148.0
browserSize=1920x1280
headless=false
closeBrowserAfterEach=true
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
# videoFolder=
# remoteUrl=

# Console log
logToConsole=true
selenideLogToConsole=true
rootLogLevel=info
