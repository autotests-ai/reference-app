# Local e2e when :8080 is occupied (e.g. selenoid on http-alt).
# ./gradlew testE2e -Denv=reference_local_e2e
# Prerequisite: SERVER_PORT=8081 docker compose up -d backend

baseUrl=http://localhost:8081/
apiBaseUrl=http://localhost:8081/
componentCatalogUrl=http://localhost:3000/

browser=chrome
browserVersion=148.0
browserSize=1920x1280
headless=true
closeBrowserAfterEach=true
closeBrowserAfterAll=true

enableHar=false
enableVnc=false
enableVideo=false

logToConsole=true
selenideLogToConsole=true
rootLogLevel=info
