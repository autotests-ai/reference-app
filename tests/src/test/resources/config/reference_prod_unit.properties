# reference_prod — unit (pure Java — helpers/*Test, config/*Test)
# ./gradlew testUnit -DpyramidStand=reference_prod

# Allure report
allureReportMode=none
allureAgentMode=none

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
baseUrl=https://reference-app.autotests.ai/
componentCatalogUrl=http://localhost:3000/

# REST API
apiBaseUrl=https://reference-app.autotests.ai/

# Browser configuration
browser=chrome
browserVersion=148.0
browserSize=1740x1080
headless=true
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
videoFolder=https://selenoid.qa.guru/video/
remoteUrl=https://user1:1234@selenoid.qa.guru/wd/hub

# Console log
logToConsole=false
selenideLogToConsole=false
rootLogLevel=warn
