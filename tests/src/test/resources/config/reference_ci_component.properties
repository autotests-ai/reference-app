# reference_ci — component (@Tag(component) — reference-app/preview on :3000 (componentCatalogUrl))
# ./gradlew testComponent -DpyramidStand=reference_ci

# Allow attachments after each test
attachBrowserConsoleLogs=false
attachHarLogs=false
attachLastScreenshot=false
attachPageSource=false
attachVideo=false
# Allow allure steps listener
enableAllureSelenideListener=false

# Target app
baseUrl=http://localhost:3000/
componentCatalogUrl=http://localhost:3000/

# REST API
apiBaseUrl=http://localhost:8080/

# Browser configuration
browser=chrome
browserVersion=148.0
browserSize=1920x1280
headless=true
closeBrowserAfterEach=true
closeBrowserAfterAll=true

# Remote browser hub configuration
enableHar=false
enableVnc=false
enableVideo=false
# videoFolder=
# remoteUrl=

# Console log
logToConsole=true
selenideLogToConsole=true
rootLogLevel=info
