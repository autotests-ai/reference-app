name: Sync Telegram creds to Jenkins

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Create Jenkins Telegram credentials
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JENKINS_PASS: ${{ secrets.JENKINS_ADMIN_PASSWORD }}
          TOPIC_ID: ${{ vars.TELEGRAM_REFERENCE_APP_TOPIC_ID }}
        run: |
          set -euo pipefail
          test -n "${TELEGRAM_BOT_TOKEN:-}"
          test -n "${TELEGRAM_CHAT_ID:-}"
          test -n "${JENKINS_PASS:-}"
          JURL=https://jenkins.qa.guru
          AUTH="admin:${JENKINS_PASS}"

          refresh_crumb() {
            CRUMB_JSON=$(curl -sS -u "$AUTH" "$JURL/crumbIssuer/api/json")
            export CRUMB FIELD
            CRUMB=$(C="$CRUMB_JSON" python -c 'import json,os; print(json.loads(os.environ["C"])["crumb"])')
            FIELD=$(C="$CRUMB_JSON" python -c 'import json,os; print(json.loads(os.environ["C"])["crumbRequestField"])')
          }

          create_secret() {
            local id="$1" desc="$2" value="$3"
            refresh_crumb
            curl -sS -u "$AUTH" -H "$FIELD: $CRUMB" -X POST \
              "$JURL/credentials/store/system/domain/_/credential/$id/doDelete" >/dev/null || true
            refresh_crumb
            CID="$id" DESC="$desc" VAL="$value" python -c '
          import os, xml.sax.saxutils as x
          print("""<com.cloudbees.plugins.credentials.impl.StringCredentialsImpl>
            <scope>GLOBAL</scope>
            <id>%s</id>
            <description>%s</description>
            <secret>%s</secret>
          </com.cloudbees.plugins.credentials.impl.StringCredentialsImpl>""" % (
            x.escape(os.environ["CID"]),
            x.escape(os.environ["DESC"]),
            x.escape(os.environ["VAL"]),
          ))
          ' > /tmp/cred.xml
            HTTP=$(curl -sS -o /tmp/cred-create.out -w "%{http_code}" -u "$AUTH" -H "$FIELD: $CRUMB" \
              -H "Content-Type: application/xml" \
              --data-binary @/tmp/cred.xml \
              "$JURL/credentials/store/system/domain/_/createCredentials")
            echo "created $id http=$HTTP"
            test "$HTTP" = "200" -o "$HTTP" = "302"
          }

          create_secret telegram-monitoring-bot-token "Telegram monitoring bot token ADR008" "$TELEGRAM_BOT_TOKEN"
          create_secret telegram-monitoring-chat-id "Telegram monitoring chat id ADR008" "$TELEGRAM_CHAT_ID"
          create_secret telegram-reference-app-topic-id "Reference-app notifications topic id" "${TOPIC_ID:-3}"

          python -c '
          import json, os, urllib.parse, urllib.request
          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat = os.environ["TELEGRAM_CHAT_ID"]
          topic = os.environ.get("TOPIC_ID") or "3"
          payload = urllib.parse.urlencode({
              "chat_id": chat,
              "message_thread_id": topic,
              "text": "Jenkins credentials synced — Reference-app notifications topic OK",
          }).encode()
          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              method="POST",
              headers={"Content-Type": "application/x-www-form-urlencoded"},
          )
          with urllib.request.urlopen(req, timeout=30) as resp:
              data = json.load(resp)
          assert data.get("ok"), data
          print("smoke_send ok topic=" + topic)
          '
