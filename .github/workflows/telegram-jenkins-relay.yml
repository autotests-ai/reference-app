name: Telegram Jenkins relay

# Jenkins agents on Selectel cannot reach api.telegram.org — relay collage/text via Actions.
# ADR 008 · topic Reference-app notifications (vars.TELEGRAM_REFERENCE_APP_TOPIC_ID)

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Jenkins BUILD_NUMBER
        required: true
        type: string
      build_url:
        description: Jenkins BUILD_URL
        required: true
        type: string
      report_url:
        description: Allure report URL
        required: false
        type: string
      testops_url:
        description: TestOps project URL
        required: false
        type: string
      summary_json:
        description: Allure 3 summary.json contents
        required: false
        type: string
      chart_b64:
        description: Optional chart.png base64 (omit if too large)
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Reference-app notifications topic
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ vars.TELEGRAM_REFERENCE_APP_TOPIC_ID }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          BUILD_URL: ${{ inputs.build_url }}
          REPORT_URL: ${{ inputs.report_url }}
          TESTOPS_URL: ${{ inputs.testops_url }}
          SUMMARY_JSON: ${{ inputs.summary_json }}
          CHART_B64: ${{ inputs.chart_b64 }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, json, os, urllib.parse, urllib.request
          from pathlib import Path

          token = os.environ["TELEGRAM_BOT_TOKEN"]
          chat = os.environ["TELEGRAM_CHAT_ID"]
          topic = int(os.environ.get("TOPIC_ID") or "3")
          build_no = os.environ.get("BUILD_NUMBER") or "?"
          build_url = os.environ.get("BUILD_URL") or ""
          report_url = os.environ.get("REPORT_URL") or ""
          testops_url = os.environ.get("TESTOPS_URL") or ""
          summary_raw = os.environ.get("SUMMARY_JSON") or ""
          chart_b64 = os.environ.get("CHART_B64") or ""

          stats = ""
          if summary_raw.strip():
              try:
                  s = json.loads(summary_raw)
                  # Allure 3 summary shapes vary — best-effort
                  sc = s.get("statistic") or s.get("stats") or {}
                  if not sc and "total" in s:
                      sc = s
                  parts = []
                  for k in ("passed", "failed", "broken", "skipped", "unknown", "total"):
                      if k in sc:
                          parts.append(f"{k}={sc[k]}")
                  stats = ", ".join(parts)
              except Exception as exc:
                  stats = f"(summary parse error: {exc})"

          lines = [
              f"<b>Reference App Jenkins #{build_no}</b>",
          ]
          if stats:
              lines.append(stats)
          if report_url:
              lines.append(f'<a href="{report_url}">report</a>')
          if testops_url:
              lines.append(f'<a href="{testops_url}">testops</a>')
          if build_url:
              lines.append(f'<a href="{build_url}">build</a>')
          text = "\n".join(lines)

          def call(method, data=None, files=None):
              url = f"https://api.telegram.org/bot{token}/{method}"
              if files is None:
                  body = json.dumps(data).encode()
                  req = urllib.request.Request(
                      url, data=body, method="POST",
                      headers={"Content-Type": "application/json"},
                  )
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      return json.load(resp)
              # multipart for photo
              import uuid
              boundary = uuid.uuid4().hex
              parts = []
              for k, v in data.items():
                  parts.append(
                      f"--{boundary}\r\nContent-Disposition: form-data; name=\"{k}\"\r\n\r\n{v}\r\n".encode()
                  )
              for name, (filename, content, ctype) in files.items():
                  parts.append(
                      (
                          f"--{boundary}\r\nContent-Disposition: form-data; name=\"{name}\"; filename=\"{filename}\"\r\n"
                          f"Content-Type: {ctype}\r\n\r\n"
                      ).encode()
                      + content
                      + b"\r\n"
                  )
              parts.append(f"--{boundary}--\r\n".encode())
              body = b"".join(parts)
              req = urllib.request.Request(
                  url, data=body, method="POST",
                  headers={"Content-Type": f"multipart/form-data; boundary={boundary}"},
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return json.load(resp)

          if chart_b64.strip():
              photo = base64.b64decode(chart_b64)
              Path("/tmp/chart.png").write_bytes(photo)
              result = call(
                  "sendPhoto",
                  data={
                      "chat_id": chat,
                      "message_thread_id": str(topic),
                      "caption": text,
                      "parse_mode": "HTML",
                  },
                  files={"photo": ("chart.png", photo, "image/png")},
              )
          else:
              result = call(
                  "sendMessage",
                  data={
                      "chat_id": chat,
                      "message_thread_id": topic,
                      "text": text,
                      "parse_mode": "HTML",
                      "disable_web_page_preview": True,
                  },
              )
          assert result.get("ok"), result
          print(f"relay ok topic={topic} build={build_no} photo={bool(chart_b64.strip())}")
          PY
